name: checador_express
description: Sistema de asistencia laboral multi-empresa con Flutter y Supabase.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Supabase
  supabase_flutter: ^2.2.0
  supabase: ^2.0.0
  
  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  # Security
  flutter_secure_storage: ^9.0.0
  
  # Location & Maps
  geolocator: ^10.0.0
  google_maps_flutter: ^2.5.0
  google_places_flutter: ^2.0.0
  
  # Camera & Biometrics
  camera: ^0.10.5
  local_auth: ^2.1.0
  
  # UI/UX
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cached_network_image: ^3.3.0
  animations: ^2.0.0
  shimmer: ^3.0.0
  
  # Networking & Serialization
  http: ^1.1.0
  dio: ^5.3.0
  
  # Utils
  logger: ^2.0.0
  get_it: ^7.6.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
